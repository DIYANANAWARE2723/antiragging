<!DOCTYPE html>
<html>
<head>
    <title>Register Complaint</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Register Complaint</h2>

<form id="complaintForm">

    <label>Full Name:</label>
    <input type="text" id="name" required>

    <label>Roll Number:</label>
    <input type="text" id="roll" required>

    <label>Department:</label>
    <input type="text" id="department" required>

    <label>Complaint Type:</label>
    <select id="type" required>
        <option value="">Select</option>
        <option>Ragging</option>
        <option>Women Harassment</option>
    </select>

    <label>Description:</label>
    <textarea id="description" rows="4" required></textarea>

    <label>Upload Evidence (optional):</label>
    <input type="file">

    <label>
        <input type="checkbox" id="anonymous">
        Submit as Anonymous
    </label>

    <br><br>
    <button type="submit" class="submit-btn">Submit Complaint</button>

</form>

<script>
document.getElementById("complaintForm").addEventListener("submit", function(e) {

    e.preventDefault();

    var complaintID = "CMP" + Date.now() + Math.floor(Math.random() * 100);

    var complaintData = {
        id: complaintID,
        name: document.getElementById("name").value,
        roll: document.getElementById("roll").value,
        department: document.getElementById("department").value,
        type: document.getElementById("type").value,
        description: document.getElementById("description").value,
        anonymous: document.getElementById("anonymous").checked
    };

    localStorage.setItem(complaintID, JSON.stringify(complaintData));

    alert("Complaint Submitted Successfully!\nYour Complaint ID: " + complaintID);

    document.getElementById("complaintForm").reset();
});
</script>

</body>
</html>
