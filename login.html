<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#2a5298;
color:white;
padding-top:100px;
}
input,select,button{
padding:10px;
margin:10px;
width:200px;
}
</style>
</head>

<body>

<h2>Login</h2>

<select id="role">
<option value="student">Student</option>
<option value="admin">Admin</option>
</select>

<br>

<input type="text" placeholder="Username">

<br>

<input type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

<script>

function login(){

let role=document.getElementById("role").value;

if(role=="admin"){
window.location="admin.html";
}

else{
window.location="track.html";
}

}

</script>

</body>
</html>
